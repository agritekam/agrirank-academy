<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriRank Academy</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f7fa;
        }

        header{
            background:#2e7d32;
            color:white;
            padding:20px;
            text-align:center;
        }

        header h1{
            font-size:32px;
        }

        header p{
            margin-top:8px;
            font-size:16px;
        }

        .hero{
            text-align:center;
            padding:50px 20px;
        }

        .hero h2{
            font-size:28px;
            color:#2e7d32;
        }

        .hero p{
            margin-top:15px;
            color:#555;
            font-size:18px;
        }

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 25px;
            background:#2e7d32;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .btn:hover{
            background:#1b5e20;
        }
    </style>

</head>
<body>

<header>
    <h1>🌾 AgriRank Academy</h1>
    <p>Learn • Prepare • Succeed</p>
</header>

<section class="hero">
    <h2>Welcome Future Agriculture Officers</h2>

    <p>
        Free Agriculture Notes, ICAR JRF Study Material,
        Hindi & English Notes and Much More.
    </p>

    <a href="#" class="btn">Explore Notes</a>
</section>

</html>
